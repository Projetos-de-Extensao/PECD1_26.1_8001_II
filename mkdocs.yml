repo_url: https://github.com/Projetos-de-Extensao/PECD1_26.1_8001_II
site_author: Grupo PECD1_26.1_8001_II
site_name: Portal AAC
copyright: Copyright 2026, Grupo PECD1_26.1_8001_II

extra_css:
  - css/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables
  - toc:
      permalink: true

plugins:
  - minify:
      minify_html: true
  - search

theme:
  name: material
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: simple/react
    favicon: simple/react
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference

nav:
  - Home: index.md
  - Transicao:
      - Documentacao da Implementacao: Transicao/documentacao_implementacao.md
      - Manual do Usuario: Transicao/manual_usuario.md
      - Issues e Projects: Transicao/issues_projects.md
  - Design Thinking:
      - Brainstorm: _Design Thinking/Brainstorm.md
      - Historias de Usuario: _Design Thinking/historiasdeusuario.md
      - Analise de Tarefas: _Design Thinking/analise_de_tarefas.md
      - 5W2H: _Design Thinking/5w2h.md
      - Mapa Mental: _Design Thinking/mapa_mental.md
      - Pesquisa: _Design Thinking/pesquisa.md
      - Prototipo de Baixa Fidelidade: _Design Thinking/prototipo_baixa_fidelidade.md
  - Sprint Planning:
      - Sprint: _Sprint Planning/sprint.md
