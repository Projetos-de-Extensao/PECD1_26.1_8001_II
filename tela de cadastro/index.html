<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibmec - Cadastro de Aluno</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="ibmec-container">
        <div class="ibmec-card">
            <div class="ibmec-header">
                <img src="ibmec-logo.png" alt="Logo Ibmec" class="ibmec-logo">
                <h2>Portal do Aluno</h2>
                <p>Crie sua conta para acessar os serviços da instituição.</p>
            </div>

            <form id="cadastroForm" class="ibmec-form">
                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="curso">Curso</label>
                    <input type="text" id="curso" name="curso" placeholder="Ex: Ciência de Dados e IA" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail Institucional</label>
                    <input type="email" id="email" name="email" placeholder="aluno@ibmec.edu.br" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <button type="submit" class="ibmec-btn">Finalizar Cadastro</button>
            </form>
            
            <div class="ibmec-footer">
                <p>Já possui cadastro? <a href="/login">Faça Login</a></p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
